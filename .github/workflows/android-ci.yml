name: Android CI Build

on:
  push:
    branches: [ "main", "master", "test" ]
  pull_request:
    branches: [ "main", "master", "test" ]

jobs:
  build:
    name: Compilar Proyecto
    runs-on: ubuntu-latest

    steps:
      - name: Checkout del código
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Configurar Java 17
        uses: actions/setup-java@c5195efecf7bdfc987ee8bae7a71cb8b11521c00 # v4.7.1
        with:
          distribution: 'temurin'
          java-version: '17'
          cache: 'gradle'

      - name: Crear archivos google-services.json por variant
        env:
          GOOGLE_SERVICES_JSON: ${{ secrets.GOOGLE_SERVICES_JSON }}
        run: |
          if [ -z "$GOOGLE_SERVICES_JSON" ]; then
            echo "Warning: GOOGLE_SERVICES_JSON secret is missing"
            echo "{}" > app/google-services.json
          else
            mkdir -p app/src/debug
            mkdir -p app/src/staging
            mkdir -p app/src/release
            echo "$GOOGLE_SERVICES_JSON" | base64 --decode > app/google-services.json
            cp app/google-services.json app/src/debug/google-services.json
            cp app/google-services.json app/src/staging/google-services.json
            cp app/google-services.json app/src/release/google-services.json
          fi

      - name: Crear archivo local.properties
        env:
          FIREBASE_API_KEY: ${{ secrets.FIREBASE_API_KEY }}
        run: |
          echo "firebase.api.key=$FIREBASE_API_KEY" > local.properties

      - name: Dar permisos al ejecutable Gradle
        run: chmod +x ./gradlew

      # DETEKT
      - name: Ejecutar análisis estático con Detekt
        run: ./gradlew detekt || echo "Detekt task failed or not found, continuing..."

      # LINT
      - name: Ejecutar Análisis Estático (Lint)
        run: ./gradlew lintDebug

      # TESTS UNITARIOS
      - name: Ejecutar Tests Unitarios con cobertura
        run: ./gradlew :app:cleanTestDebugUnitTest :app:testDebugUnitTest :app:jacocoTestReport --rerun-tasks

      - name: Verificar reporte JaCoCo
        run: |
          find app/build -path "*jacoco*" -o -name "*.exec" -o -name "*.xml"
          test -f app/build/reports/jacoco/jacocoTestReport/jacocoTestReport.xml
          grep -q "<counter type=\"LINE\"" app/build/reports/jacoco/jacocoTestReport/jacocoTestReport.xml

      - name: Analizar codigo con SonarCloud
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        run: ./gradlew sonar -Dsonar.token=$SONAR_TOKEN

      # BUILD DEBUG
      - name: Compilar APK de depuración
        run: ./gradlew assembleDebug

      # BUILD RELEASE
      - name: Compilar APK Release
        if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master'
        run: ./gradlew assembleRelease

      # SUBIR APK DEBUG
      - name: Subir APK generado
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: app-debug-apk
          path: app/build/outputs/apk/debug/app-debug.apk

      # SUBIR APK RELEASE
      - name: Subir APK Release
        if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master'
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: app-release-apk
          path: app/build/outputs/apk/release/app-release.apk

      # SUBIR REPORTES
      - name: Subir reportes de análisis y tests
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: reports
          path: |
            app/build/reports/detekt/
            app/build/reports/lint-results-debug.html
            app/build/reports/lint-results-debug.xml
            app/build/reports/tests/
            app/build/reports/jacoco/

      # CD - FIREBASE APP DISTRIBUTION
      - name: Distribuir APK con Firebase App Distribution
        if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master'
        uses: wzieba/Firebase-Distribution-Github-Action@bd494989dd4bec0343f78adee87fe66e48279ad6 # v1
        with:
          appId: ${{ secrets.FIREBASE_APP_ID }}
          token: ${{ secrets.FIREBASE_TOKEN }}
          groups: testers
          file: app/build/outputs/apk/debug/app-debug.apk
          releaseNotes: "Build automático desde rama ${{ github.ref_name }} - ${{ github.run_number }}"
